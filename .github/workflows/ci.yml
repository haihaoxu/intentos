name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONPATH: ${{ github.workspace }}/reference/src

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reference

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --upgrade pip && pip install pyyaml

      - name: Install reference
        run: pip install -e .

      - name: CLI works
        run: python -m agentos.cli list

      - name: Validate workflows
        run: |
          python -m agentos.cli workflow validate ../examples/workflows/stock_research.yaml
          python -m agentos.cli workflow validate ../examples/workflows/competitor_analysis.yaml

      - name: Validate rules
        run: python ../ci/check_rule.py

      - name: E2E run
        run: |
          python -m agentos.cli run stock_research --query "test ci" --json > "${{ runner.temp }}/e2e.json"
          python "${{ github.workspace }}/ci/check_e2e.py"

      - name: Validate schemas
        run: python "${{ github.workspace }}/ci/check_schemas.py"

      - name: Import check
        run: python "${{ github.workspace }}/ci/check_imports.py"

      - name: Constitution check
        run: python ../ci/check_constitution.py

      - name: Workflow plan
        run: |
          python -m agentos.cli workflow plan stock_research --query "test ci" --json > "${{ runner.temp }}/plan.json"
          python -c "import json; d=json.load(open('${{ runner.temp }}/plan.json')); assert len(d['stages'])>0; print(f'Plan OK: {len(d[\"stages\"])} stages')"
