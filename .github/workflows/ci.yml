name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reference

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install reference implementation
        run: pip install -e .

      - name: Validate example workflows
        run: |
          echo "=== stock_research.yaml ==="
          agentos workflow validate ../examples/workflows/stock_research.yaml
          echo "=== competitor_analysis.yaml ==="
          agentos workflow validate ../examples/workflows/competitor_analysis.yaml

      - name: Validate example rules
        run: |
          echo "=== sec-filing-rule.yaml ==="
          python -c "
import yaml
with open('../examples/rules/sec-filing-rule.yaml') as f:
    data = yaml.safe_load(f)
assert data['rule_id'] == 'rule://finance/sec-filing', f\"Bad rule_id: {data['rule_id']}\"
assert 'constraints' in data and len(data['constraints']) > 0
assert data['governance']['status'] == 'approved'
print(f\"Rule OK: {data['rule_id']} ({len(data['constraints'])} constraints)\")
"

      - name: E2E — run workflow with JSON output
        run: |
          agentos run stock_research --query "test e2e" --json > /tmp/agentos-e2e.json
          python -c "
import json
with open('/tmp/agentos-e2e.json') as f:
    d = json.load(f)
assert d['execution']['status'] == 'completed', f\"Status: {d['execution']['status']}\"
assert len(d['tasks']) == 5, f\"Tasks: {len(d['tasks'])}\"
assert d['review']['result'] == 'pass', f\"Review: {d['review']['result']}\"
print(f\"E2E PASS — {len(d['tasks'])} tasks, review={d['review']['result']}\")
"

      - name: Validate JSON schemas
        run: |
          for f in ../schemas/execution/plan.json; do
            echo "=== $f ==="
            python -c "
import json
with open('$f') as fh:
    s = json.load(fh)
assert '\$schema' in s, f'Missing \$schema in $f'
print(f'Schema OK: {s.get(\"title\", \"untitled\")} ({len(s.get(\"properties\", {}))} properties)')
"
          done

      - name: Validate Python imports
        run: python -c "
from agentos.cli import build_parser, main
from agentos.llm_executor import LlmConfig, call_llm
from agentos.planner import plan as do_plan
from agentos.execution_engine import ExecutionEngine
from agentos.reviewer import review as do_review
from agentos.reporter import format_report
from agentos.workflow_loader import discover_workflows, load, load_from_path
from agentos.models import Workflow, TaskDef, Plan, PlannedTask, TaskResult, ExecutionResult, ReviewCheck, ReviewVerdict, Event
from agentos.event_bus import EventBus
print(f'All modules import OK ({len(dir())} symbols)')
"

      - name: Verify CLI help for all commands
        run: |
          for cmd in "run --help" "list --help" "inspect --help" "workflow validate --help" "workflow plan --help"; do
            echo "=== agentos $cmd ==="
            agentos $cmd 2>&1 | head -3
          done
