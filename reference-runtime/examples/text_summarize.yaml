kind: Capability
metadata:
  name: text_summarize
  version: 1.0.0
  publisher: intent-os.org
  description: "Summarize text content into a concise summary with key points"

spec:
  input:
    text:
      type: string
      description: "The text content to summarize"
      min_length: 10
      max_length: 100000
    max_length:
      type: integer
      description: "Maximum summary length in words"
      optional: true
      default: 200
    style:
      type: string
      description: "Summary style"
      optional: true
      enum:
        - concise
        - detailed
        - bullet_points
      default: "concise"

  output:
    summary:
      type: string
      description: "The generated summary"
    key_points:
      type: array
      description: "Key points extracted from the text"
      items:
        type: string
      optional: true
    word_count:
      type: integer
      description: "Number of words in the summary"
      optional: true

  requirements:
    models:
      - gpt-4o
      - claude-sonnet-4-20250514
    min_context: 4096

  security:
    risk: low
    network: false
    data_access: false

  cost:
    estimated_tokens: "0.1_per_char"
    estimated_latency: "2000ms"
