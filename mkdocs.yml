# Intent OS — Documentation Site
site_name: Intent OS
site_description: "An open-source flight recorder for AI agents — see what your agent did, why it failed, and what it cost."
site_url: https://intent-os.org
repo_url: https://github.com/haihaoxu/intentos
repo_name: haihaoxu/intentos
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/haihaoxu/intentos

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Guide:
      - Writing a Manifest: guide/manifest.md
      - Running Capabilities: guide/runtime.md
      - Composing Workflows: guide/workflow.md
      - Security & Policies: guide/security.md
  - CLI Reference: cli/commands.md
  - Examples:
      - Translate: examples/translate.md
      - Summarize: examples/text_summarize.md
      - Code Review: examples/code_review.md
      - Sentiment Analysis: examples/sentiment_analyze.md
  - Reference:
      - Specs (GitHub): https://github.com/haihaoxu/intentos/tree/main/specs

copyright: |
  &copy; 2026 Intent OS Project —
  <a href="https://github.com/haihaoxu/intentos/blob/main/LICENSE">MIT License</a>
