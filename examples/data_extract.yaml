kind: Capability
metadata:
  name: data_extract
  version: 1.3.0
  publisher: intent-os.org
  description: "Extracts structured data from unstructured text given a user-defined schema, transforming natural language into typed objects"
  tags:
    - data-extraction
    - structured-data
    - parsing
    - etl
    - nlp
    - schema-driven

spec:
  input:
    text:
      type: string
      description: "The unstructured text to extract data from"
      min_length: 1
      max_length: 100000
    schema_description:
      type: string
      description: "Description of the target data schema. Use natural language (e.g. 'extract name, phone, and email') or a compact DSL (e.g. 'name: string, age: integer, contacts: array<object{type, value}>')"
      min_length: 1
      max_length: 2000
    mode:
      type: string
      description: "Extraction strictness mode"
      enum: ["strict", "best-effort"]
      default: "best-effort"
      optional: true
    locale:
      type: string
      description: "Locale hint for number/date parsing (BCP 47 tag)"
      pattern: "^[a-z]{2}(-[A-Z]{2})?$"
      default: "en-US"
      optional: true

  output:
    extracted_data:
      type: object
      description: "Structured data matching the requested schema. Fields are dynamically determined by the schema_description input."
      dynamic: true
    raw:
      type: string
      description: "Raw extraction in JSON-LD format for downstream ETL pipelines"
      optional: true
    confidence:
      type: number
      description: "Overall confidence in the extraction quality (0.0 to 1.0)"
      optional: true
      minimum: 0.0
      maximum: 1.0
    fields:
      type: array
      description: "Per-field extraction metadata"
      optional: true
      items:
        type: object
        properties:
          name:
            type: string
            description: "Field name"
          value:
            type: string
            description: "Extracted value"
          confidence:
            type: number
            description: "Confidence for this specific field (0.0 to 1.0)"
          source_span:
            type: string
            description: "The substring in the input text that this value was extracted from"

  requirements:
    models:
      - claude-sonnet-4
      - gpt-4o
      - gemini-2.5-pro
    tools:
      - json-output
    min_context: 32000

  security:
    risk: medium
    network: false
    data_access: true
    require_approval: false

  cost:
    estimated_tokens: "2x input length"
    estimated_latency: "< 5s per 2000 chars"
    pricing_hint: "standard generation"
